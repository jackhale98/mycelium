<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<link rel="icon" type="image/png" href="/favicon.png" />
		<title>Mycelium</title>
		%sveltekit.head%
		<script>
			// Apply dark mode immediately to prevent white flash during page load/transitions
			(function() {
				var saved = localStorage.getItem('mycelium-theme');
				var isDark = saved === 'dark' || (saved !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
				if (isDark) {
					document.documentElement.classList.add('dark');
					document.documentElement.style.colorScheme = 'dark';
				}
			})();
		</script>
	</head>
	<body data-sveltekit-preload-data="hover" style="overscroll-behavior: none;">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
