<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2618"/>
      <stop offset="100%" stop-color="#111e10"/>
    </linearGradient>
    <linearGradient id="w" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4882a"/>
      <stop offset="40%" stop-color="#e0b050"/>
      <stop offset="100%" stop-color="#f4d58d"/>
    </linearGradient>
    <linearGradient id="cap" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#c4882a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#e8b84b" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="g">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lg">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="a"><feGaussianBlur stdDeviation="22"/></filter>
  </defs>

  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <ellipse cx="256" cy="220" rx="140" ry="120" fill="#f4d58d" opacity="0.025" filter="url(#a)"/>

