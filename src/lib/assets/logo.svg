    TI: 255,82  (tip from T6, continues up)
    TJ: 215,78  (tip from T3, second fork)

    UPPER RIGHT CANOPY:
    R5: 375,195 (from R3)
    R6: 390,148 (from R3)
    RA: 342,132 (from R3, up-left)
    RB: 335,108 (tip from RA)
